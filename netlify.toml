headers = []
redirects = []

[dev]
command = "npm run dev"
targetPort = 3000
port = 8888

[functions]

  [functions."*"]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"
pinned_version = "6"

  [plugins.inputs]

[[plugins]]
origin = "ui"
package = "@21yunbox/netlify-plugin-21yunbox-deploy-to-china-cdn"

  [plugins.inputs]

[build]
publish = "/opt/build/repo/dist/client"
publishOrigin = "config"
commandOrigin = "config"
command = "vite build"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]